
title: "Jekyll SEO News Theme"
description: "A professional Jekyll theme for news/blog website optimized for Bing SEO with TailwindCSS."
keywords: "Jekyll, SEO, Blog, News, Theme, Bing, Yandex, TailwindCSS"
author: "clashwindow"
url: "https://clashwindow.github.io"
baseurl: ""
logo: "/assets/images/logo.png"
social_links:
  twitter: "#"
  facebook: "#"
  telegram: "#"
  reddit: "#"
  whatsapp: "#"
indexnow:
  key: "8575fe8139f14b2da85e40bbc8b86ce2"
  host: "clashwindow.github.io"

# Site settings
permalink: /:categories/:title/
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

paginate: 5
paginate_path: /page:num/

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - tailwind.config.js
  - postcss.config.js
  - package.json
  - package-lock.json
  - scripts/
  - .bundle/
